# Alembic configuration for TrafficVision AI
# Run from the backend/ directory: alembic upgrade head

[alembic]
# Path to migration scripts, relative to this file.
script_location = app/database/migrations

# Template for migration file names.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path entries prepended before imports (relative to this file).
prepend_sys_path = .

# Timezone for revision file timestamps; leave blank for local time.
# timezone =

# Truncate the slug field to this many characters.
# truncate_slug_length = 40

# Always run env.py even on `revision` (not just `upgrade`/`downgrade`).
# revision_environment = false

# Allow .pyc / .pyo files without a .py source to count as revisions.
# sourceless = false

# Additional version location directories (colon-separated).
# version_locations = %(here)s/bar:%(here)s/bat

# Path separator for lists in this file.
path_separator = os

# Database URL — overridden at runtime by env.py reading DATABASE_URL from the
# environment, so this placeholder is never actually used for connections.
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/trafficvision


[post_write_hooks]
# Uncomment to auto-format newly generated migration files with ruff:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
